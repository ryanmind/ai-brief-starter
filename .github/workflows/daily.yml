name: ai-morning-brief

on:
  workflow_dispatch:
    inputs:
      fetch_hours:
        description: "获取最近 N 小时的内容"
        required: false
        default: "24"
      top_n:
        description: "筛选 Top N 条资讯"
        required: false
        default: "20"
      skip_tests:
        description: "跳过测试（用于紧急发布）"
        required: false
        default: "false"
        type: boolean
  schedule:
    # 北京时间 7:30 ~ 21:30 每两小时执行一次
    - cron: "30 23 * * *"  # UTC 23:30 = 北京 07:30
    - cron: "30 1 * * *"   # UTC 01:30 = 北京 09:30
    - cron: "30 3 * * *"   # UTC 03:30 = 北京 11:30
    - cron: "30 5 * * *"   # UTC 05:30 = 北京 13:30
    - cron: "30 7 * * *"   # UTC 07:30 = 北京 15:30
    - cron: "30 9 * * *"   # UTC 09:30 = 北京 17:30
    - cron: "30 11 * * *"  # UTC 11:30 = 北京 19:30
    - cron: "30 13 * * *"  # UTC 13:30 = 北京 21:30

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: ai-morning-brief-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      # Pipeline control - workflow overrides
      IFLOW_MODEL: qwen3-coder-plus
      MAX_ITEMS: "120"
      TOP_N: ${{ github.event.inputs.top_n || '20' }}
      FETCH_HOURS: ${{ github.event.inputs.fetch_hours || '24' }}
      # History dedupe state (custom path)
      HISTORY_STATE_PATH: "reports/history_index.json"
      # Secrets
      IFLOW_API_KEY: ${{ secrets.IFLOW_API_KEY }}
      TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
      FEISHU_REPORT_DOC_URL: ${{ secrets.FEISHU_REPORT_DOC_URL }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_REPORT_FOLDER_TOKEN: ${{ secrets.FEISHU_REPORT_FOLDER_TOKEN }}
      FEISHU_DOC_SYNC_REQUIRED: "1"
      FEISHU_DOC_PUBLIC_READABLE: "1"
      FEISHU_DOC_PUBLIC_REQUIRED: "1"
      SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
      REPORT_PUBLIC_URL: ${{ format('https://{0}.github.io/{1}/latest/', github.repository_owner, github.event.repository.name) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Validate required secrets
        id: validate_secrets
        run: |
          if [ -z "${IFLOW_API_KEY}" ]; then
            echo "::error::Missing required secret: IFLOW_API_KEY"
            exit 1
          fi

      - name: Install dependencies
        id: install_deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        id: run_tests
        if: ${{ github.event.inputs.skip_tests != 'true' }}
        run: python -m pytest tests/ -v

      - name: Restore history dedupe cache
        id: restore_history_cache
        uses: actions/cache/restore@v4
        with:
          path: reports/history_index.json
          key: ai-brief-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ai-brief-history-${{ github.ref_name }}-

      - name: Generate daily brief
        id: generate_report
        run: python main.py

      - name: Save history dedupe cache
        id: save_history_cache
        if: success() && hashFiles('reports/history_index.json') != ''
        uses: actions/cache/save@v4
        with:
          path: reports/history_index.json
          key: ai-brief-history-${{ github.ref_name }}-${{ github.run_id }}

      - name: Sync latest brief to docs
        id: sync_docs
        if: success()
        run: |
          if [ ! -f reports/latest.md ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python scripts/sync_reports_to_docs.py --reports-dir reports --docs-dir docs
          if git diff --quiet -- docs/latest.md docs/history.md docs/history; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit docs and report outputs
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/latest.md docs/history.md docs/history
          git add -f reports/latest.md "reports/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]*.md"
          if git diff --cached --quiet; then
            echo "no docs/report changes, skip commit"
            exit 0
          fi
          git commit -m "docs(report): 同步每日早报与历史归档"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-brief-reports
          path: reports/

      - name: Notify Feishu
        id: notify_feishu
        continue-on-error: true
        if: success() && env.FEISHU_WEBHOOK_URL != ''
        env:
          ACTIONS_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          output=$(python scripts/notify_feishu.py reports/latest.md)
          echo "$output"
          # 提取飞书文档 URL
          feishu_doc_url=$(echo "$output" | grep "^feishu_doc_url=" | cut -d'=' -f2-)
          if [ -n "$feishu_doc_url" ]; then
            echo "feishu_doc_url=$feishu_doc_url" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify WeChat
        id: notify_wechat
        continue-on-error: true
        if: success() && env.SERVERCHAN_SENDKEY != ''
        env:
          FEISHU_DOC_URL: ${{ steps.notify_feishu.outputs.feishu_doc_url }}
        run: |
          doc_url="${FEISHU_DOC_URL:-$REPORT_PUBLIC_URL}"
          python scripts/notify_wechat.py reports/latest.md --doc-url "${doc_url}"

      - name: Summarize notification status
        id: notify_summary
        if: always()
        env:
          FEISHU_OUTCOME: ${{ steps.notify_feishu.outcome }}
          WECHAT_OUTCOME: ${{ steps.notify_wechat.outcome }}
        run: |
          feishu_status="${FEISHU_OUTCOME:-skipped}"
          wechat_status="${WECHAT_OUTCOME:-skipped}"
          echo "notify_failed=false" >> "$GITHUB_OUTPUT"
          echo "### Notification status" >> "$GITHUB_STEP_SUMMARY"
          echo "- Feishu: ${feishu_status}" >> "$GITHUB_STEP_SUMMARY"
          echo "- WeChat: ${wechat_status}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${feishu_status}" = "failure" ] || [ "${wechat_status}" = "failure" ]; then
            echo "notify_failed=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Notification failure detected (Feishu=${feishu_status}, WeChat=${wechat_status})"
          fi

      - name: Notify Feishu on notification channel failure
        continue-on-error: true
        if: always() && steps.notify_summary.outputs.notify_failed == 'true' && env.FEISHU_WEBHOOK_URL != ''
        env:
          ACTIONS_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python scripts/notify_feishu.py \
            --failure \
            --failed-step "Notify Channels" \
            --error-reason "Feishu=${{ steps.notify_feishu.outcome || 'skipped' }}, WeChat=${{ steps.notify_wechat.outcome || 'skipped' }}" \
            --run-url "${ACTIONS_RUN_URL}"

      - name: Notify Feishu on failure
        if: failure() && env.FEISHU_WEBHOOK_URL != ''
        env:
          ACTIONS_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FAILED_STEP="未知步骤"
          if [ "${{ steps.validate_secrets.outcome }}" != "success" ]; then
            FAILED_STEP="Validate required secrets"
          elif [ "${{ steps.install_deps.outcome }}" != "success" ]; then
            FAILED_STEP="Install dependencies"
          elif [ "${{ steps.run_tests.outcome }}" != "success" ]; then
            FAILED_STEP="Run tests"
          elif [ "${{ steps.generate_report.outcome }}" != "success" ]; then
            FAILED_STEP="Generate daily brief"
          fi
          ERROR_REASON="请查看任务日志中 ${FAILED_STEP} 步骤的 ERROR 输出。"
          python scripts/notify_feishu.py \
            --failure \
            --failed-step "${FAILED_STEP}" \
            --error-reason "${ERROR_REASON}" \
            --run-url "${ACTIONS_RUN_URL}"
