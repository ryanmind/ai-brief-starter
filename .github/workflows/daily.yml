name: ai-morning-brief

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *" # UTC 23:30 = Beijing 07:30

permissions:
  contents: read

concurrency:
  group: ai-morning-brief-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      QWEN_MODEL: qwen-flash
      KIMI_MODEL: kimi-latest
      MAX_ITEMS: "120"
      TOP_N: "20"
      BRIEF_MAX_CHARS: "160"
      DETAIL_MAX_CHARS: "260"
      DETAIL_MIN_CHARS: "48"
      IMPACT_MAX_CHARS: "140"
      STRICT_FACT_MODE: "1"
      FACT_OVERLAP_MIN: "0.55"
      FETCH_HOURS: "24"
      FALLBACK_FETCH_HOURS: "72"
      PER_SOURCE_ITEMS: "30"
      HISTORY_DEDUP_DAYS: "2"
      HISTORY_STATE_PATH: "reports/history_index.json"
      HISTORY_STATE_MAX_DAYS: "14"
      PER_DOMAIN_LIMIT: "4"
      ARXIV_MAX_ITEMS: "4"
      TITLE_COMPLETE_RATIO_MIN: "0.90"
      KEY_POINTS_MIN_COUNT: "2"
      KEY_POINTS_MAX_COUNT: "3"
      KEY_POINT_MAX_CHARS: "28"
      STRICT_PRIMARY_ONLY: "1"
      STRICT_AI_TOPIC_ONLY: "1"
      QUALITY_CHECK_STRICT: "1"
      NITTER_RSS_BASES: "https://nitter.net,https://nitter.poast.org,https://nitter.privacydev.net,https://nitter.d420.de,https://nitter.unixfox.eu"
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
      FEISHU_REPORT_DOC_URL: ${{ secrets.FEISHU_REPORT_DOC_URL }}
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      FEISHU_REPORT_FOLDER_TOKEN: ${{ secrets.FEISHU_REPORT_FOLDER_TOKEN }}
      FEISHU_DOC_SYNC_REQUIRED: "1"
      FEISHU_DOC_PUBLIC_READABLE: "1"
      FEISHU_DOC_PUBLIC_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Validate required secrets
        run: |
          if [ -z "${QWEN_API_KEY}" ]; then
            echo "::error::Missing required secret: QWEN_API_KEY"
            exit 1
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Restore history dedupe cache
        id: history-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: reports/history_index.json
          key: ai-brief-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ai-brief-history-${{ github.ref_name }}-

      - name: Generate daily brief
        run: python main.py

      - name: Report quality check
        run: python scripts/report_quality_check.py reports/latest.md --autofix

      - name: Save history dedupe cache
        if: success() && hashFiles('reports/history_index.json') != ''
        uses: actions/cache/save@v4
        with:
          path: reports/history_index.json
          key: ai-brief-history-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-brief-reports
          path: reports/

      - name: Notify Feishu
        if: success() && env.FEISHU_WEBHOOK_URL != ''
        env:
          ACTIONS_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python scripts/notify_feishu.py reports/latest.md
