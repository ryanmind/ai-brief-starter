name: ai-morning-brief

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *" # UTC 23:30 = Beijing 07:30

permissions:
  contents: write

concurrency:
  group: ai-morning-brief-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      QWEN_MODEL: qwen-flash
      KIMI_MODEL: kimi-latest
      MAX_ITEMS: "30"
      TOP_N: "10"
      PER_DOMAIN_LIMIT: "4"
      ARXIV_MAX_ITEMS: "4"
      TITLE_COMPLETE_RATIO_MIN: "0.90"
      STRICT_PRIMARY_ONLY: "1"
      NITTER_RSS_BASES: "https://nitter.net,https://nitter.poast.org,https://nitter.privacydev.net,https://nitter.d420.de,https://nitter.unixfox.eu"
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Validate required secrets
        run: |
          if [ -z "${QWEN_API_KEY}" ]; then
            echo "::error::Missing required secret: QWEN_API_KEY"
            exit 1
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily brief
        run: python main.py

      - name: Report quality check
        run: python scripts/report_quality_check.py reports/latest.md

      - name: Commit reports
        run: |
          if [ -n "$(git status --porcelain reports/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add reports/
            git commit -m "chore(report): update AI morning brief"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
