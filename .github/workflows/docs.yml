name: docs

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'reports/latest.md'
      - 'reports/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].md'
      - 'scripts/sync_reports_to_docs.py'
      - 'scripts/render_latest_for_mkdocs.py'
      - 'mkdocs.yml'
      - 'sources.txt'
      - 'requirements.txt'
  workflow_run:
    workflows:
      - ai-morning-brief
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync latest brief to docs
        run: python scripts/sync_reports_to_docs.py --reports-dir reports --docs-dir docs

      - name: Build documentation
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
