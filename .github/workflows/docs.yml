name: docs

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'reports/latest.md'
      - 'reports/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9].md'
      - 'scripts/sync_reports_to_docs.py'
      - 'scripts/render_latest_for_mkdocs.py'
      - 'mkdocs.yml'
      - 'sources.txt'
      - 'requirements.txt'
  workflow_run:
    workflows:
      - ai-morning-brief
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-docs.txt

      - name: Sync latest brief to docs
        run: python scripts/sync_reports_to_docs.py --reports-dir reports --docs-dir docs

      - name: Build documentation
        id: build
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      ACTIONS_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Notify Feishu on failure
        if: env.FEISHU_WEBHOOK_URL != ''
        run: |
          FAILED_STEP="Build"  # build 或 deploy 失败
          if [ "${{ needs.build.result }}" != "success" ]; then
            FAILED_STEP="Build"
          else
            FAILED_STEP="Deploy"
          fi
          python scripts/notify_feishu.py \
            --failure \
            --failed-step "Docs ${FAILED_STEP}" \
            --error-reason "GitHub Pages 构建/部署失败，请查看日志。" \
            --run-url "${ACTIONS_RUN_URL}"

      - name: Failure summary
        if: always()
        run: |
          echo "### Docs Workflow Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run URL: ${{ env.ACTIONS_RUN_URL }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build: ${{ needs.build.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy: ${{ needs.deploy.result }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.build.result }}" = "failure" ]; then
            echo "::error::Docs build failed - 检查 mkdocs 配置和 docs/ 目录"
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "::error::Docs deployment failed - 检查 GitHub Pages 配置"
          fi
