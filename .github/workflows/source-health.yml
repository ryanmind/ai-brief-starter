name: source-health-check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1" # UTC Monday 00:00

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Shanghai
      NITTER_RSS_BASES: "https://nitter.net,https://nitter.poast.org,https://nitter.privacydev.net,https://nitter.d420.de,https://nitter.unixfox.eu"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run source health check
        run: python scripts/source_health_check.py --output reports/source_health.md

      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: source-health-report
          path: reports/source_health.md
