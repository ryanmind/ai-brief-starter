name: workflow-lint

on:
  push:
    branches:
      - master
      - main
    paths:
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Run actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color -verbose .github/workflows/

      - name: Check YAML syntax
        run: |
          python << 'EOF'
          import glob
          from pathlib import Path

          import yaml


          class GitHubActionsLoader(yaml.SafeLoader):
              pass


          for first_char, mappings in list(GitHubActionsLoader.yaml_implicit_resolvers.items()):
              GitHubActionsLoader.yaml_implicit_resolvers[first_char] = [
                  (tag, regexp)
                  for tag, regexp in mappings
                  if tag != "tag:yaml.org,2002:bool"
              ]


          for path in sorted(glob.glob(".github/workflows/*.yml") + glob.glob(".github/workflows/*.yaml")):
              yaml.load(Path(path).read_text(encoding="utf-8"), Loader=GitHubActionsLoader)
              print(f"✓ {path} syntax OK")
          EOF

      - name: Validate workflow triggers
        run: |
          python << 'EOF'
          import glob
          import sys
          from pathlib import Path

          import yaml


          class GitHubActionsLoader(yaml.SafeLoader):
              pass


          for first_char, mappings in list(GitHubActionsLoader.yaml_implicit_resolvers.items()):
              GitHubActionsLoader.yaml_implicit_resolvers[first_char] = [
                  (tag, regexp)
                  for tag, regexp in mappings
                  if tag != "tag:yaml.org,2002:bool"
              ]


          def validate_workflow(path: str) -> bool:
              workflow = yaml.load(Path(path).read_text(encoding="utf-8"), Loader=GitHubActionsLoader)
              errors: list[str] = []

              if not isinstance(workflow, dict):
                  errors.append(f"{path}: workflow root must be a mapping")
              else:
                  if "on" not in workflow:
                      errors.append(f"{path}: missing 'on' trigger")

                  jobs = workflow.get("jobs")
                  if not isinstance(jobs, dict) or not jobs:
                      errors.append(f"{path}: missing 'jobs'")
                  else:
                      for job_name, job in jobs.items():
                          if not isinstance(job, dict):
                              errors.append(f"{path}: job '{job_name}' must be a mapping")
                              continue
                          if "uses" in job:
                              continue
                          if "runs-on" not in job:
                              errors.append(f"{path}: job '{job_name}' missing 'runs-on'")
                          if "steps" not in job:
                              errors.append(f"{path}: job '{job_name}' missing 'steps'")

                  if "permissions" not in workflow:
                      print(f"⚠ {path}: consider adding explicit 'permissions'")
                  if "concurrency" not in workflow:
                      print(f"⚠ {path}: consider adding 'concurrency' to prevent parallel runs")

              if errors:
                  for error in errors:
                      print(f"ERROR: {error}")
                  return False

              return True


          all_valid = True
          for path in sorted(glob.glob(".github/workflows/*.yml") + glob.glob(".github/workflows/*.yaml")):
              if not validate_workflow(path):
                  all_valid = False

          sys.exit(0 if all_valid else 1)
          EOF
