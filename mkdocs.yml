site_name: AI Brief Starter
site_description: AI 资讯自动早报生成器
site_author: Ryan
site_url: https://ryanmind.github.io/ai-brief-starter/

# 仓库信息
repo_name: ryanmind/ai-brief-starter
repo_url: https://github.com/ryanmind/ai-brief-starter
edit_uri: edit/mkdocs/docs/

# 主题配置
theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tooltips
    - content.tabs.link
    - content.code.copy
    - content.action.edit
    - content.action.view

# Markdown 扩展
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# 插件
plugins:
  - search:
      lang:
        - zh
        - en

# 导航结构
nav:
  - 首页: index.md
  - 今日早报: latest.md
  - 历史归档: history.md
  - 快速开始: quick-start.md
  - 配置说明:
      - 环境变量: configuration.md
      - 信息源配置: sources.md
  - 飞书集成: feishu_docs_guide_zh.md
  - 搭建教程: mkdocs-tutorial.md

# 额外配置
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ryanmind/ai-brief-starter

extra_css:
  - stylesheets/extra.css
