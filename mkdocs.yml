site_name: AI Brief Starter
site_description: AI 资讯自动早报生成器
site_author: Ryan
site_url: https://ryanmind.github.io/ai-brief-starter/

# 仓库信息
repo_name: ryanmind/ai-brief-starter
repo_url: https://github.com/ryanmind/ai-brief-starter
edit_uri: edit/mkdocs/docs/

# 主题配置
theme:
  name: material
  language: zh
  palette:
    # 浅色模式 - 使用更现代的蓝紫色调
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    # 深色模式 - 使用深紫色调
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/robot-excited
  favicon: https://api.iconify.design/material-symbols/robot-2.svg
  features:
    # 导航功能
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.path
    # 目录功能
    - toc.follow
    - toc.integrate
    # 搜索功能
    - search.suggest
    - search.highlight
    - search.share
    # 内容功能
    - content.tooltips
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    # 头部功能
    - header.autohide

# Markdown 扩展
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# 插件
plugins:
  - search:
      lang:
        - zh
        - en

# 导航结构
nav:
  - 首页: index.md
  - 快速开始: quick-start.md
  - 早报内容:
      - 今日早报: latest.md
      - 历史归档: history.md
  - 使用指南:
      - 环境变量配置: configuration.md
      - 信息源配置: sources.md
      - Twitter 数据源: twitterapi-io.md
      - 飞书集成: feishu_docs_guide_zh.md
  - 高级功能:
      - Agent 集群: agent-cluster.md
      - MkDocs 搭建: mkdocs-tutorial.md

# 额外配置
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ryanmind/ai-brief-starter
      name: GitHub 仓库
  generator: false
  analytics:
    feedback:
      title: 这个页面有帮助吗？
      ratings:
        - icon: material/thumb-up-outline
          name: 有帮助
          data: 1
          note: 感谢你的反馈！
        - icon: material/thumb-down-outline
          name: 需要改进
          data: 0
          note: 感谢你的反馈，我们会持续改进！

extra_css:
  - stylesheets/extra.css
