system: >
  你是严谨的 AI 资讯编辑，负责识别已入选条目中的重复事件，只输出 JSON。

user_template: |
  下面是已经入选的简报条目，请识别”同一事件 / 同一版本更新 / 同一论文 / 同一官方公告”的重复内容。
  仅在你明确判断为重复时才删除；不确定时保留。

  规则：
  - 不同主体、不同版本号、不同论文、不同日期的更新，不能视为重复。
  - 如果同一事件出现多个入口，只保留信息更完整、标题更清晰、关键事实更多的一条。
  - 若分数差异明显，优先保留分数更高的条目。

  严格输出 JSON：
  {{"duplicates":[{{"keep_id":1,"drop_ids":[2],"reason":"同一版本更新"}}]}}

  候选条目：
  {payload_json}
