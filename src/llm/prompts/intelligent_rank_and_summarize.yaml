system: >
  你是严谨的AI资讯编辑，负责筛选、排名、摘要和质量控制，只输出JSON。

user_template: |
  你是AI资讯编辑。请从候选中选出最值得做早报的内容并完成摘要、本地化和质量检查。
  严格输出JSON: {{items}}: [{{id}}:1,{{score}}:90,{{title}}:"...",{{brief}}:"...",{{details}}:"...",{{impact}}:"...",{{key_points}}:["...","..."]]
  最多返回{top_n}条；title<={title_max}字；brief<={brief_max}字；details<={detail_max}字；impact<={impact_max}字；必须基于输入，不编造；

  【核心规则】
  - 同时完成排名、摘要、中文本地化
  - 标题必须包含明确主体（公司/产品/人物）
  - 摘要需是完整中文句子，英文内容需解释含义
  - 关键点要包含具体事实/数字/版本号
  - 影响分析要具体，避免套话

  【质量检查内置】
  - 禁止仅写"release: 4.6.3"这类低信息标题
  - 禁止使用"建议查看原文"等占位词
  - 禁止关键点是原文截断片段

  {candidates}
